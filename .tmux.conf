# See https://github.com/rajanand02/dotfiles/blob/master/tmux/tmux.conf for some of this configuration

# set prefix to control-f
set -g prefix C-f

#unbind system defined prefix
unbind C-b

# helps in faster key repetition
set -g escape-time 0

# start session number from 1 rather than 0
set -g base-index 1

# start pane number from 1 similar to windows
set -g pane-base-index 1

# Make the current window the first window
bind T swap-window -t 1

# source .tmux.conf file
bind r source-file ~/.tmux.conf \; display "Configuration Reloaded!"

# dont mess up with other ctrl-a options by pressing ctrl-a twice
bind C-a send-prefix

# vertical split
bind | split-window -h -c "#{pane_current_path}"

# horizontal split
bind - split-window -v -c "#{pane_current_path}"

#new window
bind c new-window -c "#{pane_current_path}"
# pane movement similar to vim
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# to cycle through windows
bind -r C-h select-window -t :-
bind -r C-l select-window -t :+
bind b previous-window

# enable mouse
set -g mouse on

# allow mouse to select windows and panes
# set -g mouse-select-pane on
# set -g mouse-resize-pane on
# set -g mouse-select-window on

# Toggle mouse on
bind m \
    set -g mouse on
    # set -g mode-mouse on \;\
    # set -g mouse-resize-pane on \;\
    # set -g mouse-select-pane on \;\
    # set -g mouse-select-window on \;\
    display 'Mouse: ON'

# Toggle mouse off
bind M \
    set -g mouse off
    # set -g mode-mouse off \;\
    # set -g mouse-resize-pane off \;\
    # set -g mouse-select-pane off \;\
    # set -g mouse-select-window off \;\
    display 'Mouse: OFF'
#Note: hold shift key to select the text using mouse

# Modern truecolor: tmux-256color base + RGB overrides so Ghostty/nvim get 24-bit.
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -ga terminal-features ",*:RGB"

# Large scrollback + renumber windows when one is closed.
set -g history-limit 50000
set -g renumber-windows on

# monitor activities in other windows
setw -g monitor-activity on
set -g visual-activity on

# enable vi mode
setw -g mode-keys vi

# remap copy paste keys
unbind [
bind y copy-mode
unbind p
bind p paste-buffer
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection
bind-key -T copy-mode-vi r send-keys -X rectangle-toggle

# copy to system clipboard (macOS pbcopy; tmux-yank handles this automatically
# in copy-mode, these bindings stay as an explicit fallback).
bind C-c run "tmux save-buffer - | pbcopy"

# paste from system clipboard
bind C-v run "tmux set-buffer \"$(pbpaste)\"; tmux paste-buffer"

# maximizing and restoring panes
#unbind Up
#bind Up new-window -d -n tmp \; swap-pane -s tmp.1 \; select-window -t tmp
#unbind Down
#bind Down last-window \; swap-pane -s tmp.1 \; kill-window -t tmp


# switch between sessions
bind -r ( switch-client -p
bind -r ) switch-client -n

# Inherit login shell from env (Homebrew zsh at /opt/homebrew/bin/zsh is newer
# than /bin/zsh 5.9). SHELL is set by launchd/login per user preference.
set -g default-command "${SHELL}"
set -g default-shell "${SHELL}"

# recording  program output to a log
bind P pipe-pane -o "cat >>~/#W.log" \; display "Toggled logging to ~/#W.log"


# don't allow tmux to rename the window based on commands running
set-window-option -g allow-rename off

# cool screen saver
#set -g lock-after-time 3000
#set -g lock-command "cmatrix -s"

# tmux-continuum — auto-restore last session on fresh launch (crash recovery).
# The custom startup hook in custom/includes/.tmux still handles first-run.
set -g @continuum-boot 'on'
set -g @continuum-restore 'on'


# restore vim session even after shutdown
set -g @resurrect-strategy-vim "session"
# vim-tmux-focus
set -g focus-events on
set -g @continuum-save-interval '1'
# include status line powerline theme
source-file ~/configs/custom/includes/tmux/tmuxline_theme
#set-option -g @batt_charged_icon ""
set-option -g @batt_charging_icon "⚡"
set-option -g @batt_discharging_icon ""
set -g @online_icon "✔"
set -g @offline_icon "✗"
set-option -g status on
set-option -g status-interval 2
set-option -g status-justify "centre"
set-option -g status-left-length 60
set-option -g status-right-length 90

# Tmux plugins
# NOTE: ofirgall/tmux-window-name needs Python `libtmux`:
#   pip install --user libtmux
# (once per Python interpreter; mise version switches require reinstall)
set -g @tpm_plugins "              \
  tmux-plugins/tpm                 \
  tmux-plugins/tmux-sensible       \
  ofirgall/tmux-window-name        \
  tmux-plugins/tmux-resurrect      \
  tmux-plugins/tmux-battery        \
  tmux-plugins/tmux-online-status  \
  tmux-plugins/tmux-yank           \
  tmux-plugins/tmux-copycat        \
  tmux-plugins/tmux-continuum      \
  catppuccin/tmux                  \
"

# catppuccin/tmux — modern theme, coexists with the custom tmuxline_theme
# included above. Set CATPPUCCIN_TMUX_ON=true in .thisservrc (or similar)
# to prefer it; left configured but unobtrusive by default.
set -g @catppuccin_flavour 'mocha'

# tmux-window-name
set -g @tmux_window_name_shells "['zsh', 'bash', 'sh']"
set -g @tmux_window_dir_programs "['nvim', 'vim', 'vi', 'git']"
set -g @tmux_window_max_name_len "20"
set -g @tmux_window_name_use_tilde "False"

# initializes TMUX plugin manager
run-shell ~/.tmux/plugins/tpm/tpm
